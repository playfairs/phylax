name = "Suspicious Process Execution"
event = "process_created"
enabled = true
severity = "medium"

[[conditions]]
field = "command"
operator = "contains"
value = "curl"

[[conditions]]
field = "command"
operator = "contains"
value = "http"

[[actions]]
action_type = "alert"
parameters = { message = "Suspicious process detected: curl with HTTP request" }
